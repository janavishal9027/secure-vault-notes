# nginx location snippet for the notes service.
#
# Dropped into /etc/nginx/snippets/${KUBE_NAMESPACE}/ on the VPS by
# ci/deploy-remote.sh. The host's parent server block includes
# /etc/nginx/snippets/<cluster>/*.location.conf, so this snippet is
# picked up automatically when nginx reloads.
#
# /notes/* beats the UI's catch-all "/" via nginx's most-specific match,
# so requests to /notes/api/notes/createdNote, /notes/api/notes/transcribe,
# etc. all land here and everything else falls through to the UI.
#
# ${LXD_BRIDGE_IP} is substituted at deploy time by ci/deploy.sh — it's the
# IP of the cluster's LXD container on lxdbr0, where Traefik listens on :80.
# Traefik then forwards into the notes pod whose Ingress claims the /notes
# path.
location /notes/ {
    proxy_pass         http://${LXD_BRIDGE_IP}:80;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Voice-to-text uploads can be up to 25 MB (matches
    # spring.servlet.multipart.max-file-size in application.yml). Mirror
    # that ceiling here so the host proxy doesn't 413 before reaching
    # the service.
    client_max_body_size 25M;

    # Transcription via OpenAI Whisper can take 10-30s for longer audio
    # clips. Generous read timeout so the request doesn't get cut off
    # mid-stream.
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}
